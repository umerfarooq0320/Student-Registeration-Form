<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
    <link rel="stylesheet" href="st.css">
</head>
<body>
    <h2>Student Registration Form</h2>
    <div class="container">
        <form action="" style="border: 2px solid black;">
            <label><strong>Name</strong></label><br>
            <input type="text" required><br>

            <label><strong>Email</strong></label><br>
            <input type="email" required><br>

            <label><strong>Gender</strong></label><br>
            <input type="radio" name="gender" id="male" value="Male"><label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="Female"><label for="female">Female</label>
            <br><br>

            <label><strong>Choose your Desired Subjects</strong></label><br>
            <input type="checkbox" name="subject" value="Chemistry"> Chemistry<br>
            <input type="checkbox" name="subject" value="Physics"> Physics<br>
            <input type="checkbox" name="subject" value="Maths"> Maths<br>
            <input type="checkbox" name="subject" value="Computer"> Computer<br>
            <input type="checkbox" name="subject" value="Islamiat"> Islamiat<br>
            <input type="checkbox" name="subject" value="P.s.t"> P.s.t<br>
            <input type="checkbox" name="subject" value="Communication"> Communication<br>
            <input type="checkbox" name="subject" value="Statistics"> Statistics<br><br>

            <label><strong>Choose your program</strong></label><br>
            <select name="program">
                <option value="Computer Science">Computer Science</option>
                <option value="Commerce">Commerce</option>
                <option value="Medical">Medical</option>
                <option value="Engineering">Engineering</option>
            </select><br><br>

            <label><strong>Any Other Queries</strong></label><br>
            <textarea rows="3"></textarea><br><br>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
